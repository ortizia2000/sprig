<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sprig · dashboard</title>
<style>
  :root{ --bg:#f6f7f4; --card:#fff; --ink:#1b211d; --mut:#6b736c; --line:#e4e6e1;
         --green:#1f9d6b; --greenbg:#e6f4ee; --gray:#8b938c; --graybg:#eef0ec; --accent:#0f6e56; }
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif}
  .wrap{max-width:1120px;margin:0 auto;padding:28px 20px 64px}
  header{display:flex;flex-wrap:wrap;align-items:baseline;gap:12px;margin-bottom:6px}
  h1{font-size:28px;margin:0;letter-spacing:-.5px}
  .tag{font-size:13px;color:var(--mut)}
  .updated{margin-left:auto;font-size:12px;color:var(--mut)}
  .actions{display:flex;gap:10px;margin:14px 0 22px;flex-wrap:wrap}
  a.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid var(--line);
    border-radius:10px;background:#fff;color:var(--ink);text-decoration:none;font-size:13px;font-weight:500}
  a.btn:hover{border-color:var(--accent);color:var(--accent)}
  a.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .stats{display:flex;gap:12px;margin-bottom:22px;flex-wrap:wrap}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 18px;min-width:120px}
  .stat .n{font-size:24px;font-weight:600} .stat .l{font-size:12px;color:var(--mut)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
  .card .top{display:flex;gap:12px;padding:12px}
  .thumb{width:78px;height:98px;object-fit:cover;border-radius:8px;background:#0c1214;flex:none}
  .meta{min-width:0}
  .pid{font-weight:600;font-size:14px;text-transform:capitalize}
  .when{font-size:12px;color:var(--mut);margin-top:2px}
  .badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .b{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;display:inline-flex;gap:5px;align-items:center}
  .b.live{background:var(--greenbg);color:var(--green)} .b.sched{background:var(--graybg);color:var(--gray)}
  .b.type{background:#eef3fb;color:#2f6fb0}
  .cap{padding:0 12px 10px;font-size:12.5px;color:var(--mut)}
  .cap .more{color:var(--accent);cursor:pointer;font-weight:500}
  .mrow{display:flex;gap:14px;border-top:1px solid var(--line);padding:11px 12px;flex-wrap:wrap}
  .m{font-size:12px;color:var(--mut)} .m b{display:block;font-size:16px;color:var(--ink);font-weight:600}
  .empty{border-top:1px dashed var(--line);padding:11px 12px;font-size:12px;color:var(--mut)}
  footer{margin-top:30px;font-size:12px;color:var(--mut)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🌱 Sprig</h1>
    <span class="tag">your auto-publisher · @myceliumai.co</span>
    <span class="updated" id="updated"></span>
  </header>
  <div class="actions">
    <a class="btn primary" href="https://github.com/ortizia2000/sprig/edit/main/content/posts.yaml" target="_blank">Edit the queue ↗</a>
    <a class="btn" href="https://github.com/ortizia2000/sprig/actions/workflows/publish.yml" target="_blank">Run / view publishes ↗</a>
    <a class="btn" href="https://github.com/ortizia2000/sprig" target="_blank">Repo ↗</a>
  </div>
  <div class="stats" id="stats"></div>
  <div class="grid" id="grid"></div>
  <footer id="foot"></footer>
</div>
<script>
const PLAT={instagram:"IG",facebook:"FB",linkedin:"LI"};
function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function metricRow(m){
  const ig=m.instagram||{}, fb=m.facebook||{};
  const cells=[];
  const add=(l,v)=>{ if(v!==undefined&&v!==null) cells.push(`<div class="m"><b>${v}</b>${l}</div>`); };
  add("reach",ig.reach); add("likes",ig.likes); add("comments",ig.comments); add("saved",ig.saved);
  if(ig.views!==undefined) add("views",ig.views);
  add("FB reactions",fb.reactions); add("FB comments",fb.comments);
  return cells.length? `<div class="mrow">${cells.join("")}</div>`
                     : `<div class="empty">Metrics appear here once the post is live.</div>`;
}
function card(p){
  const badges = p.platforms.map(pl=>{
    const live=(p.published||[]).includes(pl);
    return `<span class="b ${live?'live':'sched'}">${live?'●':'○'} ${PLAT[pl]||pl} ${live?'live':'scheduled'}</span>`;
  }).join("");
  const cap=esc(p.caption_en||"");
  const short=cap.length>140? cap.slice(0,140)+'…':cap;
  return `<div class="card">
    <div class="top">
      <img class="thumb" src="${p.thumb||''}" alt="" loading="lazy"
           onerror="this.style.visibility='hidden'">
      <div class="meta">
        <div class="pid">${esc(p.id)}</div>
        <div class="when">${p.date} · ${p.time} ${p.tz.split('/')[1]||''}</div>
        <div class="badges"><span class="b type">${esc(p.type)}</span>${badges}</div>
      </div>
    </div>
    <div class="cap">${short}</div>
    ${metricRow(p.metrics||{})}
  </div>`;
}
fetch('./data.json?'+Date.now()).then(r=>r.json()).then(d=>{
  document.getElementById('updated').textContent = d.updated? 'updated '+d.updated.replace('T',' ')+' UTC':'';
  const posts=d.posts||[];
  const pub=posts.filter(p=>(p.published||[]).length).length;
  document.getElementById('stats').innerHTML=
    [["Posts",posts.length],["Published",pub],["Scheduled",posts.length-pub]]
    .map(([l,n])=>`<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");
  document.getElementById('grid').innerHTML=posts.map(card).join("");
  document.getElementById('foot').textContent=
    "Performance is pulled daily from the Instagram & Facebook APIs. Edit captions or timing in posts.yaml — the queue updates on the next run.";
}).catch(e=>{
  document.getElementById('grid').innerHTML='<p>Could not load data.json yet. It is generated on the first Actions run.</p>';
});
</script>
</body>
</html>
