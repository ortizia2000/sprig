<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sprig · dashboard</title>
<style>
  :root{ --bg:#f6f7f4; --card:#fff; --ink:#1b211d; --mut:#6b736c; --line:#e7e9e3;
         --green:#1f9d6b; --greenbg:#e6f4ee; --accent:#0f6e56; --hover:#f2f4ef; }
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif}
  .wrap{max-width:1280px;margin:0 auto;padding:24px 18px 64px}
  header{display:flex;flex-wrap:wrap;align-items:baseline;gap:12px}
  h1{font-size:24px;margin:0;letter-spacing:-.4px}
  .tag{font-size:13px;color:var(--mut)} .updated{margin-left:auto;font-size:12px;color:var(--mut)}
  .bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:16px 0}
  a.btn,button.f{font:inherit;display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border:1px solid var(--line);
    border-radius:9px;background:#fff;color:var(--ink);text-decoration:none;font-size:13px;font-weight:500;cursor:pointer}
  a.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  a.btn:hover,button.f:hover{border-color:var(--accent);color:var(--accent)}
  button.f.on{background:var(--green);color:#fff;border-color:var(--green)}
  .spacer{flex:1}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
  .seg button{font:inherit;border:0;border-radius:0;padding:7px 12px;background:#fff;cursor:pointer;font-size:13px} .seg button.on{background:var(--accent);color:#fff}
  .stats{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 16px;min-width:96px}
  .stat .n{font-size:21px;font-weight:600;line-height:1.1} .stat .l{font-size:11.5px;color:var(--mut)}
  .tablewrap{background:var(--card);border:1px solid var(--line);border-radius:13px;overflow:auto}
  table{border-collapse:collapse;width:100%;min-width:880px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap;vertical-align:middle}
  th{position:sticky;top:0;background:#fbfcfa;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut);font-weight:600;cursor:pointer;user-select:none}
  th.sortable:hover{color:var(--accent)} th .ar{opacity:.5;font-size:10px}
  tr:last-child td{border-bottom:0} tbody tr:hover{background:var(--hover)}
  td.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600} td.num.dim{color:#c4c8c1;font-weight:400}
  td.when{cursor:default} td.when.edit{cursor:pointer;color:var(--accent)} td.when.edit:hover{text-decoration:underline}
  .thumb{width:42px;height:54px;object-fit:cover;border-radius:6px;background:#e9ebe6;display:block}
  .post .id{font-weight:600;text-transform:capitalize} .post .cap{color:var(--mut);font-size:12px;max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-block;margin-right:4px;border:1px solid}
  .pill.live{background:var(--greenbg);color:var(--green);border-color:#bfe3d2} .pill.sched{background:#fff;color:var(--mut);border-color:var(--line)}
  .type{font-size:12px;color:#2f6fb0;background:#eef3fb;padding:2px 9px;border-radius:20px}
  .fbnote{font-size:11px;color:var(--mut);margin-top:3px}
  .calbar{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:10px}
  .caltitle{font-size:17px;font-weight:600;min-width:170px;text-align:center}
  .calhead{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:8px}
  .calhead div{font-size:11.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px;text-align:center}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  .day{background:var(--card);border:1px solid var(--line);border-radius:10px;min-height:96px;padding:6px}
  .day.empty{background:transparent;border:0} .day.dragover{border-color:var(--accent);background:var(--greenbg)}
  .dnum{font-size:12px;color:var(--mut);text-align:right;margin-bottom:4px}
  .day.today{border-color:var(--accent)} .day.today .dnum{color:var(--accent);font-weight:600}
  .chip{display:flex;align-items:center;gap:5px;border-left:3px solid var(--line);background:#fbfcfa;border-radius:5px;padding:3px 5px;margin-bottom:4px}
  .chip.live{border-left-color:var(--green)} .chip.sched{border-left-color:#cfd4cc}
  .chip.drag{cursor:grab} .chip.drag:active{cursor:grabbing}
  .chip img{width:18px;height:22px;object-fit:cover;border-radius:3px;background:#e9ebe6;flex:none}
  .chip span{font-size:11px;font-weight:600;text-transform:capitalize} .chip em{font-size:10px;color:var(--mut);font-style:normal;margin-left:auto}
  .ovl{position:fixed;inset:0;background:rgba(20,24,27,.45);display:flex;align-items:center;justify-content:center;z-index:50}
  .modal{background:#fff;border-radius:14px;padding:22px;max-width:430px;width:92%;box-shadow:0 10px 40px rgba(0,0,0,.2)}
  .modal h3{margin:0 0 8px;font-size:18px} .modal p{color:var(--mut);font-size:13px;margin:0 0 14px}
  .modal label{display:block;font-size:12px;color:var(--mut);margin:10px 0 4px}
  .modal input{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font:inherit}
  .modal .row{display:flex;gap:14px} .modal .row>div{flex:1}
  .modal .acts{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:60;opacity:0;transition:opacity .2s}
  .toast.show{opacity:1}
  footer{margin-top:18px;font-size:12px;color:var(--mut)}
</style>
</head>
<body>
<div class="wrap">
  <header><h1>🌱 Sprig</h1><span class="tag">@myceliumai.co</span><span class="updated" id="updated"></span></header>
  <div class="bar">
    <a class="btn primary" href="https://github.com/ortizia2000/sprig/edit/main/content/posts.yaml" target="_blank">Edit captions ↗</a>
    <a class="btn" href="https://github.com/ortizia2000/sprig/actions/workflows/publish.yml" target="_blank">Runs ↗</a>
    <button class="f" id="editBtn"></button>
    <div class="seg" id="viewF"><button data-v="table" class="on">Table</button><button data-v="calendar">Calendar</button></div>
    <span class="spacer"></span>
    <div class="seg" id="statusF"><button data-v="all" class="on">All</button><button data-v="scheduled">Scheduled</button><button data-v="published">Published</button></div>
    <div class="seg" id="chanF"><button data-v="all" class="on">All</button><button data-v="instagram">IG</button><button data-v="facebook">FB</button><button data-v="linkedin">LI</button></div>
  </div>
  <div class="stats" id="stats"></div>
  <div id="view"></div>
  <footer id="foot"></footer>
</div>
<div id="modalHost"></div>
<div class="toast" id="toast"></div>

<script>
const REPO="ortizia2000/sprig", PLAT={instagram:"IG",facebook:"FB",linkedin:"LI"};
const MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MONLONG=["January","February","March","April","May","June","July","August","September","October","November","December"];
const COLS=[{k:"thumb",t:""},{k:"post",t:"Post"},{k:"when",t:"When",sort:1},{k:"channels",t:"Channels"},
  {k:"type",t:"Type"},{k:"reach",t:"Reach",sort:1,num:1},{k:"likes",t:"Likes",sort:1,num:1},
  {k:"comments",t:"Comments",sort:1,num:1},{k:"saved",t:"Saves",sort:1,num:1}];
let DATA=[], OVR={}, sortK="when", sortDir=1, fStatus="all", fChan="all", view="table", calMonth=null;
const esc=s=>(s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const ig=(p,k)=>((p.metrics||{}).instagram||{})[k];
const isPub=p=>(p.published||[]).length>0;
const eff=p=>({date:(OVR[p.id]||{}).date||p.date, time:(OVR[p.id]||{}).time||p.time});
const tsOf=p=>{const e=eff(p);return Date.parse(e.date+"T"+(e.time||"00:00")+":00");};
function fmtWhen(p){const e=eff(p);const [Y,M,D]=e.date.split("-");let [h,mi]=(e.time||"00:00").split(":").map(Number);
  const ap=h>=12?"pm":"am",h12=(h%12)||12;return `${MON[(+M)-1]}-${D}-${Y} · ${h12}:${String(mi).padStart(2,"0")} ${ap} EST`;}
const token=()=>localStorage.getItem("sprig_token");
const editing=()=>!!token();

function filtered(){return DATA.filter(p=>{
  if(fStatus==="published"&&!isPub(p))return false; if(fStatus==="scheduled"&&isPub(p))return false;
  if(fChan!=="all"&&!(p.platforms||[]).includes(fChan))return false; return true;});}
function sorted(rows){return rows.slice().sort((a,b)=>{let va,vb;
  if(sortK==="when"){va=tsOf(a);vb=tsOf(b);}else{va=ig(a,sortK)??-1;vb=ig(b,sortK)??-1;}return (va-vb)*sortDir;});}

/* ---------- table ---------- */
function renderTable(){
  const head=COLS.map(c=>{const ar=c.k===sortK?`<span class="ar">${sortDir>0?"▲":"▼"}</span>`:"";
    return `<th class="${c.sort?'sortable':''} ${c.num?'num':''}" data-k="${c.k}">${c.t} ${ar}</th>`;}).join("");
  const rows=sorted(filtered()).map(p=>{
    const chans=(p.platforms||[]).map(pl=>{const l=(p.published||[]).includes(pl);
      return `<span class="pill ${l?'live':'sched'}">${PLAT[pl]||pl}${l?' ●':''}</span>`;}).join("");
    const fb=((p.metrics||{}).facebook)||{};
    const fbn=(fb.reactions!=null||fb.comments!=null)?`<div class="fbnote">FB ♥ ${fb.reactions??0} · 💬 ${fb.comments??0}</div>`:"";
    const num=k=>{const v=ig(p,k);return v==null?`<td class="num dim">—</td>`:`<td class="num">${v.toLocaleString()}</td>`;};
    return `<tr><td><img class="thumb" src="${esc(p.thumb||'')}" alt=""></td>
      <td class="post"><div class="id">${esc(p.id)}</div><div class="cap">${esc(p.caption_en||'')}</div></td>
      <td class="when ${editing()?'edit':''}" data-id="${esc(p.id)}">${fmtWhen(p)}</td>
      <td>${chans}${fbn}</td><td><span class="type">${esc(p.type)}</span></td>
      ${num("reach")}${num("likes")}${num("comments")}${num("saved")}</tr>`;}).join("")
    || `<tr><td colspan="9" style="color:var(--mut);padding:20px">No posts match this filter.</td></tr>`;
  document.getElementById("view").innerHTML=`<div class="tablewrap"><table><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>`;
  document.querySelectorAll("th.sortable").forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(k===sortK)sortDir*=-1;else{sortK=k;sortDir=1;}render();});
  if(editing()) document.querySelectorAll("td.when.edit").forEach(td=>td.onclick=()=>openEdit(td.dataset.id));
}
/* ---------- calendar ---------- */
function renderCalendar(){
  const posts=filtered(),byDate={}; posts.forEach(p=>{const d=eff(p).date;(byDate[d]=byDate[d]||[]).push(p);});
  const y=calMonth.getFullYear(),m=calMonth.getMonth();
  const startDow=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  const t=new Date(),tS=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  const chip=p=>`<div class="chip ${isPub(p)?'live':'sched'} ${editing()&&!isPub(p)?'drag':''}" draggable="${editing()&&!isPub(p)}" data-id="${esc(p.id)}">
      <img src="${esc(p.thumb||'')}"><span>${esc(p.id)}</span><em>${(p.platforms||[]).map(x=>PLAT[x]).join(' ')}</em></div>`;
  let cells=""; for(let i=0;i<startDow;i++)cells+=`<div class="day empty"></div>`;
  for(let d=1;d<=days;d++){const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells+=`<div class="day ${ds===tS?'today':''}" data-date="${ds}"><div class="dnum">${d}</div>${(byDate[ds]||[]).map(chip).join("")}</div>`;}
  document.getElementById("view").innerHTML=`
    <div class="calbar"><button class="f" id="pm">‹</button><div class="caltitle">${MONLONG[m]} ${y}</div><button class="f" id="nm">›</button></div>
    <div class="calhead">${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>`<div>${d}</div>`).join("")}</div>
    <div class="cal">${cells}</div>`;
  document.getElementById("pm").onclick=()=>{calMonth=new Date(y,m-1,1);render();};
  document.getElementById("nm").onclick=()=>{calMonth=new Date(y,m+1,1);render();};
  if(editing()) wireDnD();
  document.querySelectorAll(".chip").forEach(c=>{ if(editing()) c.ondblclick=()=>openEdit(c.dataset.id); });
}
function wireDnD(){
  document.querySelectorAll(".chip.drag").forEach(c=>{
    c.ondragstart=e=>{e.dataTransfer.setData("text/plain",c.dataset.id);e.dataTransfer.effectAllowed="move";};});
  document.querySelectorAll(".day[data-date]").forEach(cell=>{
    cell.ondragover=e=>{e.preventDefault();cell.classList.add("dragover");};
    cell.ondragleave=()=>cell.classList.remove("dragover");
    cell.ondrop=e=>{e.preventDefault();cell.classList.remove("dragover");
      const id=e.dataTransfer.getData("text/plain"),p=DATA.find(x=>x.id===id);
      if(!p)return; const cur=eff(p); setOverride(id,cell.dataset.date,cur.time);};
  });
}
/* ---------- editing ---------- */
function setOverride(id,date,time){
  OVR[id]={date,time}; render(); saveSchedule();
}
function openEdit(id){
  const p=DATA.find(x=>x.id===id); if(!p)return; const e=eff(p);
  modal(`<h3>Reschedule ${esc(id)}</h3><p>Set the date and time this post goes live (EST).</p>
    <div class="row"><div><label>Date</label><input id="ed" type="date" value="${e.date}"></div>
    <div><label>Time</label><input id="et" type="time" value="${e.time}"></div></div>
    <div class="acts"><button class="f" id="ec">Cancel</button><button class="f on" id="es">Save</button></div>`,
    ()=>{ document.getElementById("ec").onclick=closeModal;
      document.getElementById("es").onclick=()=>{const d=document.getElementById("ed").value,tm=document.getElementById("et").value;
        if(d&&tm){closeModal();setOverride(id,d,tm);}}; });
}
async function loadOverrides(){
  try{
    const h={Accept:"application/vnd.github+json"}; if(token()) h.Authorization="Bearer "+token();
    const r=await fetch(`https://api.github.com/repos/${REPO}/contents/content/schedule.json?ref=main&t=`+Date.now(),{headers:h});
    if(!r.ok) return {};
    const j=await r.json();
    return JSON.parse(decodeURIComponent(escape(atob((j.content||"").replace(/\n/g,""))))||"{}");
  }catch(e){ return {}; }
}
async function saveSchedule(){
  if(!token()){ tokenModal(); return; }
  toast("Saving…");
  try{
    const url=`https://api.github.com/repos/${REPO}/contents/content/schedule.json`;
    let sha; const g=await fetch(url,{headers:{Authorization:"Bearer "+token(),Accept:"application/vnd.github+json"}});
    if(g.ok) sha=(await g.json()).sha;
    const body={message:"schedule: update via dashboard",content:btoa(unescape(encodeURIComponent(JSON.stringify(OVR,null,2)))),sha};
    const r=await fetch(url,{method:"PUT",headers:{Authorization:"Bearer "+token(),Accept:"application/vnd.github+json","Content-Type":"application/json"},body:JSON.stringify(body)});
    if(r.ok) toast("Saved · the publisher will use the new time"); else { toast("Save failed ("+r.status+") — check your token"); }
  }catch(err){ toast("Save failed — network/token"); }
}
/* ---------- token + modal ---------- */
function tokenModal(){
  modal(`<h3>Enable editing</h3>
    <p>To drag-and-drop and reschedule, paste a GitHub token. It is stored only in this browser, never in the code.
    Create a <a href="https://github.com/settings/personal-access-tokens/new" target="_blank">fine-grained token</a> with
    <b>Repository access: only ${REPO}</b> and <b>Permissions → Contents → Read and write</b>.</p>
    <label>GitHub token</label><input id="tk" type="password" placeholder="github_pat_…">
    <div class="acts"><button class="f" id="tc">Cancel</button><button class="f on" id="ts">Save token</button></div>`,
    ()=>{ document.getElementById("tc").onclick=closeModal;
      document.getElementById("ts").onclick=()=>{const v=document.getElementById("tk").value.trim();
        if(v){localStorage.setItem("sprig_token",v);closeModal();setEditBtn();render();toast("Editing enabled");}}; });
}
function modal(html,after){document.getElementById("modalHost").innerHTML=`<div class="ovl"><div class="modal">${html}</div></div>`;
  document.querySelector(".ovl").onclick=e=>{if(e.target.classList.contains("ovl"))closeModal();}; if(after)after();}
function closeModal(){document.getElementById("modalHost").innerHTML="";}
let toastT; function toast(m){const el=document.getElementById("toast");el.textContent=m;el.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove("show"),2600);}
function setEditBtn(){const b=document.getElementById("editBtn");
  if(editing()){b.textContent="🔓 Editing on";b.classList.add("on");b.onclick=()=>{if(confirm("Turn editing off and forget the token on this browser?")){localStorage.removeItem("sprig_token");setEditBtn();render();}};}
  else{b.textContent="🔒 Enable editing";b.classList.remove("on");b.onclick=tokenModal;}}
/* ---------- shell ---------- */
function stats(){const pub=DATA.filter(isPub).length,reach=DATA.reduce((s,p)=>s+(ig(p,"reach")||0),0);
  const c=[["Posts",DATA.length],["Published",pub],["Scheduled",DATA.length-pub]]; if(reach>0)c.push(["Total reach",reach.toLocaleString()]);
  document.getElementById("stats").innerHTML=c.map(([l,n])=>`<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");}
function render(){ view==="calendar"?renderCalendar():renderTable(); }
function wireSeg(id,fn){document.querySelectorAll(`#${id} button`).forEach(b=>b.onclick=()=>{
  document.querySelectorAll(`#${id} button`).forEach(x=>x.classList.remove("on"));b.classList.add("on");fn(b.dataset.v);render();});}
Promise.all([
  fetch('./data.json?'+Date.now()).then(r=>r.json()),
  loadOverrides()
]).then(([d,ov])=>{
  DATA=d.posts||[]; OVR=ov||{};
  const dates=DATA.map(p=>eff(p).date).filter(Boolean).sort();
  calMonth=dates.length?new Date(dates[0]+"T00:00:00"):new Date(); calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth(),1);
  document.getElementById('updated').textContent=d.updated?'updated '+d.updated.replace('T',' ')+' UTC':'';
  document.getElementById('foot').textContent="Calendar: enable editing, then drag a post to another day or double-click it to set the exact time. Metrics fill in once a post is live.";
  wireSeg("viewF",v=>view=v); wireSeg("statusF",v=>fStatus=v); wireSeg("chanF",v=>fChan=v); setEditBtn();
  stats(); render();
}).catch(()=>{document.getElementById('view').innerHTML='<p style="padding:20px;color:var(--mut)">Could not load data.json yet — it builds on the first Actions run.</p>';});
</script>
</body>
</html>
