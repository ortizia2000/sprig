<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sprig · dashboard</title>
<style>
  :root{ --bg:#f6f7f4; --card:#fff; --ink:#1b211d; --mut:#6b736c; --line:#e7e9e3;
         --green:#1f9d6b; --greenbg:#e6f4ee; --accent:#0f6e56; --hover:#f2f4ef; }
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif}
  .wrap{max-width:1280px;margin:0 auto;padding:24px 18px 64px}
  header{display:flex;flex-wrap:wrap;align-items:baseline;gap:12px}
  h1{font-size:24px;margin:0;letter-spacing:-.4px}
  .tag{font-size:13px;color:var(--mut)} .updated{margin-left:auto;font-size:12px;color:var(--mut)}
  .bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:16px 0}
  a.btn,button.f{font:inherit;display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border:1px solid var(--line);
    border-radius:9px;background:#fff;color:var(--ink);text-decoration:none;font-size:13px;font-weight:500;cursor:pointer}
  a.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  a.btn:hover,button.f:hover{border-color:var(--accent);color:var(--accent)}
  .spacer{flex:1}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
  .seg button{border:0;border-radius:0;padding:7px 12px;background:#fff} .seg button.on{background:var(--accent);color:#fff}
  .stats{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 16px;min-width:96px}
  .stat .n{font-size:21px;font-weight:600;line-height:1.1} .stat .l{font-size:11.5px;color:var(--mut)}
  .tablewrap{background:var(--card);border:1px solid var(--line);border-radius:13px;overflow:auto}
  table{border-collapse:collapse;width:100%;min-width:880px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap;vertical-align:middle}
  th{position:sticky;top:0;background:#fbfcfa;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut);font-weight:600;cursor:pointer;user-select:none}
  th.sortable:hover{color:var(--accent)} th .ar{opacity:.5;font-size:10px}
  tr:last-child td{border-bottom:0} tbody tr:hover{background:var(--hover)}
  td.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
  td.num.dim{color:#c4c8c1;font-weight:400}
  .thumb{width:42px;height:54px;object-fit:cover;border-radius:6px;background:#e9ebe6;display:block}
  .post .id{font-weight:600;text-transform:capitalize} .post .cap{color:var(--mut);font-size:12px;max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-block;margin-right:4px;border:1px solid}
  .pill.live{background:var(--greenbg);color:var(--green);border-color:#bfe3d2}
  .pill.sched{background:#fff;color:var(--mut);border-color:var(--line)}
  .type{font-size:12px;color:#2f6fb0;background:#eef3fb;padding:2px 9px;border-radius:20px}
  .fbnote{font-size:11px;color:var(--mut);margin-top:3px}
  footer{margin-top:18px;font-size:12px;color:var(--mut)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🌱 Sprig</h1><span class="tag">@myceliumai.co</span>
    <span class="updated" id="updated"></span>
  </header>

  <div class="bar">
    <a class="btn primary" href="https://github.com/ortizia2000/sprig/edit/main/content/posts.yaml" target="_blank">Edit the queue ↗</a>
    <a class="btn" href="https://github.com/ortizia2000/sprig/actions/workflows/publish.yml" target="_blank">Runs ↗</a>
    <a class="btn" href="https://github.com/ortizia2000/sprig" target="_blank">Repo ↗</a>
    <span class="spacer"></span>
    <div class="seg" id="statusF">
      <button data-v="all" class="on">All</button><button data-v="scheduled">Scheduled</button><button data-v="published">Published</button>
    </div>
    <div class="seg" id="chanF">
      <button data-v="all" class="on">All channels</button><button data-v="instagram">IG</button><button data-v="facebook">FB</button><button data-v="linkedin">LinkedIn</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="tablewrap">
    <table>
      <thead><tr id="head"></tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
  <footer id="foot"></footer>
</div>

<script>
const PLAT={instagram:"IG",facebook:"FB",linkedin:"LI"};
const COLS=[
  {k:"thumb",t:"",sort:0},{k:"post",t:"Post",sort:0},{k:"when",t:"When",sort:1},
  {k:"channels",t:"Channels",sort:0},{k:"type",t:"Type",sort:0},
  {k:"reach",t:"Reach",sort:1,num:1},{k:"likes",t:"Likes",sort:1,num:1},
  {k:"comments",t:"Comments",sort:1,num:1},{k:"saved",t:"Saves",sort:1,num:1},
];
let DATA=[], sortK="when", sortDir=1, fStatus="all", fChan="all";
function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function ig(p,k){return ((p.metrics||{}).instagram||{})[k];}
function isPub(p){return (p.published||[]).length>0;}
function whenLabel(p){return p.date+" · "+p.time+" EST";}
function tsOf(p){return Date.parse(p.date+"T"+(p.time||"00:00")+":00");}

function filtered(){
  return DATA.filter(p=>{
    if(fStatus==="published" && !isPub(p)) return false;
    if(fStatus==="scheduled" && isPub(p)) return false;
    if(fChan!=="all" && !(p.platforms||[]).includes(fChan)) return false;
    return true;
  }).sort((a,b)=>{
    let va,vb;
    if(sortK==="when"){va=tsOf(a);vb=tsOf(b);}
    else {va=ig(a,sortK)??-1; vb=ig(b,sortK)??-1;}
    return (va-vb)*sortDir;
  });
}
function head(){
  document.getElementById("head").innerHTML=COLS.map(c=>{
    const ar = c.k===sortK? `<span class="ar">${sortDir>0?"▲":"▼"}</span>`:"";
    return `<th class="${c.sort?'sortable':''} ${c.num?'num':''}" data-k="${c.k}">${c.t} ${ar}</th>`;
  }).join("");
  document.querySelectorAll("th.sortable").forEach(th=>th.onclick=()=>{
    const k=th.dataset.k; if(k===sortK) sortDir*=-1; else {sortK=k; sortDir=1;}
    render();
  });
}
function row(p){
  const chans=(p.platforms||[]).map(pl=>{
    const live=(p.published||[]).includes(pl);
    return `<span class="pill ${live?'live':'sched'}">${PLAT[pl]||pl}${live?' ●':''}</span>`;
  }).join("");
  const fb=((p.metrics||{}).facebook)||{};
  const fbn=(fb.reactions!=null||fb.comments!=null)? `<div class="fbnote">FB ♥ ${fb.reactions??0} · 💬 ${fb.comments??0}</div>`:"";
  const num=k=>{const v=ig(p,k); return v==null? `<td class="num dim">—</td>`:`<td class="num">${v.toLocaleString()}</td>`;};
  return `<tr>
    <td><img class="thumb" src="${esc(p.thumb||'')}" alt=""></td>
    <td class="post"><div class="id">${esc(p.id)}</div><div class="cap">${esc(p.caption_en||'')}</div></td>
    <td>${whenLabel(p)}</td>
    <td>${chans}${fbn}</td>
    <td><span class="type">${esc(p.type)}</span></td>
    ${num("reach")}${num("likes")}${num("comments")}${num("saved")}
  </tr>`;
}
function render(){
  head();
  const rows=filtered();
  document.getElementById("rows").innerHTML = rows.length? rows.map(row).join("")
    : `<tr><td colspan="9" style="color:var(--mut);padding:20px">No posts match this filter.</td></tr>`;
}
function stats(){
  const pub=DATA.filter(isPub).length;
  const reach=DATA.reduce((s,p)=>s+(ig(p,"reach")||0),0);
  const cards=[["Posts",DATA.length],["Published",pub],["Scheduled",DATA.length-pub]];
  if(reach>0) cards.push(["Total reach",reach.toLocaleString()]);
  document.getElementById("stats").innerHTML=cards.map(([l,n])=>`<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");
}
function wireSeg(id,set){
  document.querySelectorAll(`#${id} button`).forEach(b=>b.onclick=()=>{
    document.querySelectorAll(`#${id} button`).forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); set(b.dataset.v); render();
  });
}
fetch('./data.json?'+Date.now()).then(r=>r.json()).then(d=>{
  DATA=d.posts||[];
  document.getElementById('updated').textContent=d.updated? 'updated '+d.updated.replace('T',' ')+' UTC':'';
  document.getElementById('foot').textContent="Performance pulls daily from the Instagram & Facebook APIs. Edit a caption or time in the queue and it updates on the next run. Metrics fill in once a post is live.";
  wireSeg("statusF",v=>fStatus=v); wireSeg("chanF",v=>fChan=v);
  stats(); render();
}).catch(()=>{ document.getElementById('rows').innerHTML='<tr><td colspan="9" style="padding:20px">Could not load data.json yet — it builds on the first Actions run.</td></tr>'; });
</script>
</body>
</html>
